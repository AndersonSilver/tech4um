# Produção na VPS — stack isolada (não conflita com outros apps).
# Postgres/Redis só na rede interna; app exposto em localhost para o Nginx do host.
#
# Uso:
#   cp .env.production.example .env   # preencher segredos
#   docker compose -f docker-compose.prod.yml up -d --build
#
name: tech4um

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Defina DB_PASSWORD no .env}"
      POSTGRES_DB: tech4um
    volumes:
      - tech4um_postgres_data:/var/lib/postgresql/data
    networks:
      - tech4um_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Defina REDIS_PASSWORD no .env}"
    command: >
      sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - tech4um_redis_data:/data
    networks:
      - tech4um_internal
    healthcheck:
      test:
        ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      JWT_SECRET: "${JWT_SECRET:?Defina JWT_SECRET no .env}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-2h}"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "${DB_PASSWORD:?Defina DB_PASSWORD no .env}"
      DB_NAME: tech4um
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGIN: "${CORS_ORIGIN:?Defina CORS_ORIGIN no .env}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      RECAPTCHA_SECRET_KEY: "${RECAPTCHA_SECRET_KEY:?Defina RECAPTCHA_SECRET_KEY no .env}"
      RECAPTCHA_MIN_SCORE: "${RECAPTCHA_MIN_SCORE:-0.5}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
      TYPEORM_SYNC_ONCE: "${TYPEORM_SYNC_ONCE:-false}"
    volumes:
      - tech4um_uploads:/app/apps/backend/uploads
    ports:
      # 0.0.0.0 no host — NPM (Docker) alcança via 172.17.0.1; firewall bloqueia acesso externo direto.
      - "${TECH4UM_BACKEND_PORT:-8174}:3333"
    networks:
      - tech4um_internal

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:?Defina VITE_API_URL no .env}"
        VITE_SOCKET_URL: "${VITE_SOCKET_URL:?Defina VITE_SOCKET_URL no .env}"
        VITE_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
        VITE_RECAPTCHA_SITE_KEY: "${VITE_RECAPTCHA_SITE_KEY:?Defina VITE_RECAPTCHA_SITE_KEY no .env}"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${TECH4UM_FRONTEND_PORT:-8173}:80"
    networks:
      - tech4um_internal

networks:
  tech4um_internal:
    driver: bridge

volumes:
  tech4um_postgres_data:
    name: tech4um_prod_postgres_data
  tech4um_redis_data:
    name: tech4um_prod_redis_data
  tech4um_uploads:
    name: tech4um_prod_uploads
