version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Defina DB_PASSWORD no seu shell ou em um .env antes de rodar docker compose}"
      POSTGRES_DB: tech4um
    ports:
      - "5432:5432"
    volumes:
      - tech4um_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Defina REDIS_PASSWORD no .env da raiz}"
    command: >
      sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - tech4um_redis_data:/data
    healthcheck:
      test:
        ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      JWT_SECRET: "${JWT_SECRET:?Defina JWT_SECRET no seu shell ou em um .env antes de rodar docker compose, ex - openssl rand -hex 32}"
      JWT_EXPIRES_IN: 2h
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "${DB_PASSWORD:?Defina DB_PASSWORD no seu shell ou em um .env antes de rodar docker compose}"
      DB_NAME: tech4um
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5173}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      RECAPTCHA_SECRET_KEY: "${RECAPTCHA_SECRET_KEY:?Defina RECAPTCHA_SECRET_KEY (CAPTCHA) antes de rodar docker compose}"
      SMTP_HOST: "${SMTP_HOST:?Defina SMTP_HOST (envio de e-mail) antes de rodar docker compose}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-Tech4um <no-reply@tech4um.dev>}"
    ports:
      - "3333:3333"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3333/api}"
        VITE_SOCKET_URL: "${VITE_SOCKET_URL:-http://localhost:3333}"
        VITE_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
        VITE_RECAPTCHA_SITE_KEY: "${VITE_RECAPTCHA_SITE_KEY:-6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI}"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  tech4um_postgres_data:
  tech4um_redis_data:
