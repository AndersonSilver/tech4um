version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Defina DB_PASSWORD no seu shell ou em um .env antes de rodar docker compose}"
      POSTGRES_DB: tech4um
    ports:
      - "5432:5432"
    volumes:
      - tech4um_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      JWT_SECRET: "${JWT_SECRET:?Defina JWT_SECRET no seu shell ou em um .env antes de rodar docker compose, ex - openssl rand -hex 32}"
      JWT_EXPIRES_IN: 2h
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "${DB_PASSWORD:?Defina DB_PASSWORD no seu shell ou em um .env antes de rodar docker compose}"
      DB_NAME: tech4um
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    ports:
      - "3333:3333"

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_API_URL: http://localhost:3333/api
        VITE_SOCKET_URL: http://localhost:3333
        VITE_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  tech4um_postgres_data:
